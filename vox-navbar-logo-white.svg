      .vox-title-w { font-family: 'Space Grotesk', system-ui, -apple-system, sans-serif; font-weight: 900; font-size: 50px; fill: #FFFFFF; letter-spacing: -0.02em; }
      .vox-sub-w { font-family: 'Space Grotesk', system-ui, -apple-system, sans-serif; font-weight: 700; font-size: 14px; fill: #FFFFFF; opacity: 0.85; letter-spacing: 0.22em; text-transform: uppercase; }
