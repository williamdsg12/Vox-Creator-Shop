<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 96" width="400" height="96">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;800;900&amp;display=swap');
      .vox-title { font-family: 'Space Grotesk', system-ui, -apple-system, sans-serif; font-weight: 900; font-size: 54px; fill: #FFFFFF; letter-spacing: -0.02em; }
      .vox-x { fill: #C6FF00; }
      .vox-sub { font-family: 'Space Grotesk', system-ui, -apple-system, sans-serif; font-weight: 800; font-size: 15px; fill: #C6FF00; letter-spacing: 0.22em; text-transform: uppercase; }
      .vox-badge { font-family: 'Space Grotesk', system-ui, -apple-system, sans-serif; font-weight: 800; font-size: 14px; fill: #FF6A00; letter-spacing: 0.18em; text-transform: uppercase; }
    </style>
    <linearGradient id="iconBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#182200"/>
      <stop offset="100%" stop-color="#080C00"/>
    </linearGradient>
    <filter id="greenGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <g id="logo-main-tight">
    <!-- Icon Container -->
    <g id="logo-icon" filter="url(#greenGlow)">
      <rect x="2" y="3" width="90" height="90" rx="22" fill="url(#iconBg)" stroke="#C6FF00" stroke-width="3.5"/>
      <g transform="translate(47, 48)">
        <rect x="-28" y="-12" width="8" height="24" rx="4" fill="#C6FF00"/>
        <rect x="-14" y="-24" width="8" height="48" rx="4" fill="#C6FF00"/>
        <rect x="0" y="-34" width="8" height="68" rx="4" fill="#FF6A00"/>
        <rect x="14" y="-24" width="8" height="48" rx="4" fill="#C6FF00"/>
        <rect x="28" y="-12" width="8" height="24" rx="4" fill="#C6FF00"/>
      </g>
    </g>

    <!-- Text Group -->
    <g transform="translate(108, 2)">
      <text x="0" y="52" class="vox-title">VO<tspan class="vox-x">X</tspan></text>
      <text x="2" y="78" class="vox-sub">CREATOR <tspan class="vox-badge">SHOP</tspan></text>
    </g>
  </g>
</svg>